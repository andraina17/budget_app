{% extends 'base.html' %}
{% block title %}Add Account - Budget Tracker{% endblock %}
{% block content %}
  <h2 class="mt-3">Add Account</h2>
  <form method="POST" action="{{ url_for('add_account') }}" class="mt-3">
    <div class="mb-3">
      <label for="name" class="form-label">Account Name</label>
      <input type="text" class="form-control" id="name" name="name" placeholder="e.g. Checking" required>
    </div>
    <div class="mb-3">
      <label for="balance" class="form-label">Initial Balance</label>
      <input type="number" step="0.01" class="form-control" id="balance" name="balance" placeholder="0.00">
    </div>
    <button type="submit" class="btn btn-primary">Save Account</button>
    <a href="{{ url_for('list_accounts') }}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
