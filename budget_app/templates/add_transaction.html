{% extends 'base.html' %}
{% block title %}Add Transaction - Budget Tracker{% endblock %}
{% block content %}
  <h2 class="mt-3">Add Transaction</h2>
  <form method="POST" action="{{ url_for('add_transaction') }}" class="mt-3">
    <div class="mb-3">
      <label for="account_id" class="form-label">Account</label>
      <select class="form-select" id="account_id" name="account_id" required>
        <option value="" disabled selected>Choose an account...</option>
        {% for account in accounts %}
          <option value="{{ account.id }}">{{ account.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label for="date" class="form-label">Date</label>
      <input type="date" class="form-control" id="date" name="date" value="{{ request.form.get('date', '') or '' }}" required>
    </div>
    <div class="mb-3">
      <label for="description" class="form-label">Description</label>
      <input type="text" class="form-control" id="description" name="description" placeholder="e.g. Grocery shopping" required>
    </div>
    <div class="mb-3">
      <label for="amount" class="form-label">Amount</label>
      <input type="number" step="0.01" class="form-control" id="amount" name="amount" placeholder="0.00" required>
    </div>
    <div class="mb-3">
      <label for="type" class="form-label">Type</label>
      <select class="form-select" id="type" name="type" required>
        <option value="Debit">Debit (Expense)</option>
        <option value="Credit">Credit (Income)</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary">Save Transaction</button>
    <a href="{{ url_for('list_transactions') }}" class="btn btn-secondary">Cancel</a>
  </form>
{% endblock %}
